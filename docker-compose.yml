version: '3.8'

services:
  telegram-crm-bot:
    build: .
    container_name: telegram_crm_bot
    restart: unless-stopped
    environment:
      - BOT_TOKEN=${BOT_TOKEN}
      - API_KEY=${API_KEY}
      - BASE_URL=${BASE_URL}
      - CHAT_ID=${CHAT_ID}
    # Не публикуем порты, т.к. бот работает через polling
    # Опционально: лимиты ресурсов
    deploy:
      resources:
        limits:
          cpus: '0.5'
          memory: 256M
    # Для сохранения lastSeenDealId между перезапусками
    volumes:
      - ./bot-data:/app/data
    # Логирование
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"