name: Deploy to Yandex Cloud Registry

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Log in to Yandex Cloud Registry
        run: |
          echo "${{ secrets.YC_TOKEN }}" | docker login \
            --username oauth \
            --password-stdin \
            cr.yandex

      - name: Build Docker image
        run: |
          docker build -t cr.yandex/${{ secrets.YC_REGISTRY_ID }}/telegram-crm-bot:latest .
          docker build -t cr.yandex/${{ secrets.YC_REGISTRY_ID }}/telegram-crm-bot:${{ github.sha }} .

      - name: Push to Yandex Cloud Registry
        run: |
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/telegram-crm-bot:latest
          docker push cr.yandex/${{ secrets.YC_REGISTRY_ID }}/telegram-crm-bot:${{ github.sha }}