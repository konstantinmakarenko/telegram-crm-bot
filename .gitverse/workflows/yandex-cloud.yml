name: Deploy to Yandex Cloud Registry (kaniko)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Yandex Cloud Registry
        run: |
          echo "${{ secrets.YC_TOKEN }}" | docker login \
            --username oauth \
            --password-stdin \
            cr.yandex

      - name: Build and push with kaniko
        uses: aevea/kaniko@master
        with:
          registry: cr.yandex
          repository: ${{ secrets.YC_REGISTRY_ID }}/telegram-crm-bot
          username: oauth
          password: ${{ secrets.YC_TOKEN }}
          tag_with_latest: true
          tag: ${{ github.sha }}
          cache: true