name: Deploy to Yandex Cloud Registry (simple)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push with kaniko
        run: |
          docker run \
            -v $(pwd):/workspace \
            gcr.io/kaniko-project/executor:latest \
            --dockerfile=/workspace/Dockerfile \
            --context=/workspace \
            --destination=cr.yandex/${{ secrets.YC_REGISTRY_ID }}/telegram-crm-bot:latest \
            --destination=cr.yandex/${{ secrets.YC_REGISTRY_ID }}/telegram-crm-bot:${{ github.sha }}