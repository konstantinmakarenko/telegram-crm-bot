name: Deploy to Docker Hub (kaniko)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push with kaniko
        run: |
          docker run \
            -v $(pwd):/workspace \
            -v /tmp/kaniko_cache:/cache \
            -e DOCKER_CONFIG=/workspace/.docker \
            gcr.io/kaniko-project/executor:latest \
            --dockerfile=/workspace/Dockerfile \
            --context=/workspace \
            --destination=docker.io/${{ vars.DOCKER_HUB_USERNAME }}/telegram-crm-bot:latest \
            --destination=docker.io/${{ vars.DOCKER_HUB_USERNAME }}/telegram-crm-bot:${{ github.sha }} \
            --cache=true \
            --cache-dir=/cache

      - name: Logout from Docker Hub
        if: always()
        run: docker logout