name: Deploy to Docker Hub

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Create Docker config.json for Docker Hub
        run: |
          mkdir -p "${{ gitverse.workspace }}/.docker"
          # Получаем base64 от строки "username:password"
          AUTH=$(echo -n "${{ vars.DOCKER_HUB_USERNAME }}:${{ secrets.DOCKER_HUB_PASSWORD }}" | base64 -w 0)
          # Создаём JSON через jq (безопасно, без ручного экранирования)
          echo "{\"auths\":{\"https://index.docker.io/v1/\":{\"auth\":\"${AUTH}\"}}}" > "${{ gitverse.workspace }}/.docker/config.json"
          # Альтернативный вариант через printf (если jq нет)
          # printf '{"auths":{"https://index.docker.io/v1/":{"auth":"%s"}}}' "$AUTH" > "${{ gitverse.workspace }}/.docker/config.json"
          chmod 600 "${{ gitverse.workspace }}/.docker/config.json"
          # Проверка: выводим содержимое (без пароля, только для отладки)
          cat "${{ gitverse.workspace }}/.docker/config.json"

      - name: Build and push with Kaniko
        uses: docker://gcr.io/kaniko-project/executor:v1.24.0
        env:
          DOCKER_CONFIG: ${{ gitverse.workspace }}/.docker
        with:
          args: >-
            --context=dir://${{ gitverse.workspace }}
            --dockerfile=${{ gitverse.workspace }}/Dockerfile
            --destination=docker.io/${{ vars.DOCKER_HUB_USERNAME }}/telegram-crm-bot:latest
            --destination=docker.io/${{ vars.DOCKER_HUB_USERNAME }}/telegram-crm-bot:${{ github.sha }}
            --cache=true