name: Deploy to Docker Hub (kaniko)

on:
  push:
    branches:
      - master
  workflow_dispatch:

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Build and push with kaniko
        uses: aevea/kaniko@master
        with:
          registry: docker.io
          repository: ${{ vars.DOCKER_USERNAME }}/telegram-crm-bot
          username: ${{ vars.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
          tag_with_latest: true
          tag: ${{ github.sha }}
          cache: true